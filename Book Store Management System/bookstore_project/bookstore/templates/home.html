<!DOCTYPE html>
<html>
<head>
    <title>Book Store</title>
    <style>
        body { font-family: Arial; background:#f4f4f4; }
        .navbar { background:#2c3e50; color:white; padding:15px; text-align:center; font-size:22px; }
        .container { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; padding:20px; }
        .card {
            background:white;
            padding:15px;
            border-radius:8px;
            box-shadow:0px 3px 10px rgba(0,0,0,0.1);
            text-align:center;
        }
        .card img { width:100%; height:200px; object-fit:cover; }
        .btn {
            background:#3498db;
            color:white;
            padding:8px 12px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        .btn:hover { background:#2980b9; }
    </style>
</head>
<body>

<div class="navbar">Online Book Store</div>

<div class="container">
    {% for book in books %}
    <div class="card">
        <img src="{{ book.image.url }}">
        <h3>{{ book.title }}</h3>
        <p>Author: {{ book.author }}</p>
        <p>₹{{ book.price }}</p>
        <a href="{% url 'add_to_cart' book.id %}">
            <button class="btn">Add to Cart</button>
        </a>
    </div>
    {% endfor %}
</div>

</body>
</html>
