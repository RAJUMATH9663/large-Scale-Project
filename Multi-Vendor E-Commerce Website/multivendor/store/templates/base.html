{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiVendor Store</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">
                <i class="fa-solid fa-store"></i> MultiVendor
            </a>
            <div class="nav-links">
                <a href="{% url 'home' %}"><i class="fa-solid fa-house"></i> Home</a>
                <a href="{% url 'cart' %}"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
                <a href="{% url 'orders' %}"><i class="fa-solid fa-box"></i> Orders</a>
                {% if user.is_authenticated %}
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit"
                        style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem; font-weight:500; transition:color 0.2s ease; display:flex; align-items:center; gap:0.4rem;">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </form>
                {% else %}
                <a href="{% url 'login' %}"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
</body>

</html>
